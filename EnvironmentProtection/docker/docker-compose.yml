# Docker Compose 基础配置

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: lvfat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: lvfat
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../infrastructure/database/mysql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - lvfat-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: lvfat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - lvfat-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: lvfat-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - lvfat-network

  # Milvus 向量数据库
  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: lvfat-milvus
    restart: unless-stopped
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - lvfat-network

  # Milvus 依赖: etcd
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: lvfat-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    networks:
      - lvfat-network

volumes:
  mysql_data:
  redis_data:
  minio_data:
  milvus_data:
  etcd_data:

networks:
  lvfat-network:
    driver: bridge